<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>サイバー攻撃4択問題　3問目</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="quiz-container">
            <h3 class="quiz-question">問題3: ランサムウェアなどでデータを失った場合に備える対策はどれか。</h3>

            <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" value="1" /> 1. パスワードを共有する
                </label>
                <label>
                    <input type="radio" name="q1" value="2" /> 2. OSを更新しない
                </label>
                <label>
                    <input type="radio" name="q1" value="3" /> 3. セキュリティソフトを削除する
                </label>
                <label>
                    <input type="radio" name="q1" value="4" /> 4. バックアップを取る
                </label>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：4. バックアップを取る</strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
                        重要なデータを別の場所にコピーして保存しておく<span class="underline">「バックアップ」</span>が重要。
							バックアップがあれば、感染後でも保存しておいたデータから復旧できる可能性がある。</strong><br />
                    </p>
                     <p class="nextpage">
                          <a href="index.html">ホームへ戻る</a>
                    </p>
                </div>
            </details>
        </div>
    </body>
</html>
