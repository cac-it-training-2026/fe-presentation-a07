<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>HTML/CSS 4択問題</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="quiz-container">
            <h3 class="quiz-question">問題2:PCやサーバのデータを暗号化し、復旧のために金銭を要求する攻撃はどれか。</h3>

            <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" value="1" /> 1. サプライチェーン攻撃
                </label>
                <label>
                    <input type="radio" name="q1" value="2" /> 2. ランサムウェア攻撃
                </label>
                <label>
                    <input type="radio" name="q1" value="3" /> 3. フィッシング攻撃
                </label>
                <label>
                    <input type="radio" name="q1" value="4" /> 4. DDoS攻撃
                </label>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：2. ランサムウェア攻撃</strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：「ランサムウェア攻撃」とは、PCやサーバのデータを暗号化し、「復旧したければ金を払え」と要求する攻撃。
								近年では、KADOKAWAやアサヒビールの事例が話題となり、企業活動に影響を与えた。
						</strong><br />
                        
                    </p>
                </div>
            </details>
        </div>
    </body>
</html>
