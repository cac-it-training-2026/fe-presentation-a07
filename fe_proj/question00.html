<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>サイバー攻撃4択問題　1問目</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="quiz-container">
            <h3 class="quiz-question">問題1:サイバー攻撃によって起こる可能性がある事象として、適切なものはどれか。
			
			</h3>

            <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" value="1" /> 1.システム障害や情報漏洩
                </label>
                <label>
                    <input type="radio" name="q1" value="2" /> 2. データの改ざんや削除
                </label>
                <label>
                    <input type="radio" name="q1" value="3" /> 3. コンピューターの遠隔操作
                </label>
                <label>
                    <input type="radio" name="q1" value="4" /> 4. すべて当てはまる
                </label>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：4. すべて当てはまる</strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
                      サイバー攻撃では、<span class="underline">情報漏えい・システム停止・データ改ざん・遠隔操作</span>など、さまざまな被害が発生する可能性がある。
                      場合によっては、業務停止や金銭的被害につながる。
                    </p>
                     
                    <p class="nextpage">
                          <a href="question01.html">次の問題へ</a>
                    </p>
                </div>
            </details>
        </div>
    </body>
</html>
